hor="middle" fill="#F5A623">Edit</text><rect x="330" y="532" width="970" height="70" rx="12" fill="white" stroke="#E5E7EB"/><text x="360" y="562" font-size="18" font-weight="700">No-show Policy</text><text x="360" y="586" font-size="13" fill="#6B7280">Charges for order not picked up</text><text x="1030" y="572" font-size="16" font-weight="700">Rs 20</text><rect x="1190" y="550" width="70" height="34" rx="8" fill="white" stroke="#E5E7EB"/><text x="1225.0" y="573.0" font-size="14" font-weight="700" text-anchor="middle" fill="#F5A623">Edit</text><rect x="330" y="620" width="970" height="70" rx="12" fill="white" stroke="#E5E7EB"/><text x="360" y="650" font-size="18" font-weight="700">Credit Expiry</text><text x="360" y="674" font-size="13" fill="#6B7280">Credits expire after</text><text x="1030" y="660" font-size="16" font-weight="700">30 Days</text><rect x="1190" y="638" width="70" height="34" rx="8" fill="white" stroke="#E5E7EB"/><text x="1225.0" y="661.0" font-size="14" font-weight="700" text-anchor="middle" fill="#F5A623">Edit</text>
